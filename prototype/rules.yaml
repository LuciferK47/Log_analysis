# ============================================================================
# Diagnostic Rules — Declarative Failure Heuristics (Upgraded)
# ============================================================================

rules:
  R001:
    id: "R001"
    name: "Primary Power Collapse"
    category: "Hardware/Power"
    description: "Battery voltage sagged below critical threshold for a sustained period."
    severity: "CRITICAL"
    streams:
      required: ["batt_voltage_min"]
      optional: []
    conditions:
      - feature: "batt_voltage_min"
        operator: "<"
        threshold: 10.5
    logic: "AND"
    windows:
      macro_window_sec: 2.0
      micro_window_sec: null
    causality:
      is_root_cause_candidate: true
      symptoms: ["R002", "R003"]
    plot_signals:
      - "BATT.Volt"
      - "BATT.Curr"

  R002:
    id: "R002"
    name: "EKF Primary Core Divergence"
    category: "Navigation/EKF"
    description: "EKF velocity or position innovations breached limits."
    severity: "HIGH"
    streams:
      required: ["ekf_pos_variance"]
      optional: []
    conditions:
      - feature: "ekf_pos_variance"
        operator: ">"
        threshold: 1.0
    logic: "AND"
    windows:
      macro_window_sec: null
      micro_window_sec: 0.1
    causality:
      is_root_cause_candidate: true
      symptoms: ["R004"]
      demote_if_preceded_by: ["R001", "R005"]
    plot_signals:
      - "NKF4.SP"
      - "NKF4.SV"

  R005:
    id: "R005"
    name: "Physical Impact / Crash Detected"
    category: "Hardware/Airframe"
    description: "Massive instantaneous acceleration spike indicating a physical impact."
    severity: "CRITICAL"
    streams:
      required: ["vibe_x"] 
      optional: []
    conditions:
      - feature: "vibe_x"
        operator: ">"
        threshold: 60
    logic: "AND"
    windows:
      macro_window_sec: null
      micro_window_sec: 0.05
    causality:
      is_root_cause_candidate: true
      symptoms: ["ALL_SENSOR_NOISE", "R002"]
    plot_signals:
      - "VIBE.VibeX"
      - "VIBE.VibeY"
      - "VIBE.VibeZ"
